_version = 1

# UN Motion Supervisor の日本語 (ja-JP) リソース。
# rust-i18n v4 が compile-time に読み込み、Tauri command 経由で
# svelte-i18n にも同じデータを供給する (src/i18n.rs 参照)。
#
# プレースホルダーは rust-i18n の `%{name}` syntax で書く。Svelte 側へ
# bridge する際に regex で `{name}` に変換される。
#
# キー命名規約: dot-separated lower_snake_case。
#   sidebar.capturers / settings.app_behavior.title 等。

