[[permission]]
identifier = "supervisor-invoke"
description = "UN Motion Supervisor: custom IPC commands registered in lib.rs."
commands.allow = [
	"list_capturers",
	"launch_capturer",
	"stop_capturer",
	"stop_all_capturers",
	"capturer_runtime_status",
	"calibrate_capturer_neutral",
	"clear_capturer_neutral_calibration",
	"build_capturer_face_pose_model",
	"save_capturer_unmf_pose",
	"save_all_capturers_unmf_pose",
	"list_profiles",
	"selected_profile_id",
	"set_selected_profile_id",
	"active_profile_id",
	"set_active_profile",
	"create_profile",
	"delete_profile",
	"duplicate_profile",
	"reorder_profiles",
	"get_profile_detail",
	"update_profile_field",
	"get_app_settings",
	"set_stop_capturers_on_exit",
	"sync_app_settings",
	"open_external_url",
	"open_ffmpeg_home",
	"probe_video_file_metadata",
	"save_supervisor_logs",
	"pick_file_path",
	"reveal_profiles_dir",
	"reveal_supervisor_logs_dir",
	"show_supervisor_console",
	"enumerate_webcams",
	"enumerate_webcam_formats",
	"app_version",
	"i18n_get_svelte_bundle",
	"i18n_available_locales",
	"i18n_resolve_default_locale",
]
